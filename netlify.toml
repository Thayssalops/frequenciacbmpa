# Configuração do Netlify para gestao-interna-dtic
# Documentação: https://docs.netlify.com/

[build]
# Comando de build
# Como o Netlify não pode rodar Python, apenas sirva os arquivos estáticos
publish = "public"
command = "echo 'Build complete - frontend estático pronto'"

# Variáveis de ambiente
[build.environment]
PYTHON_VERSION = "3.11"

# Fallback para SPA (se usar JavaScript frontend)
# NOTA: Colocar wildcard por último (ordem importa!)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Redirecionamentos para API externa (backend Python)
# Descomentar e ajustar quando tiver backend rodando
# [[redirects]]
# from = "/api/*"
# to = "https://SEU_BACKEND_URL/api/:splat"
# status = 200
# force = false

# Configuração de headers
[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "SAMEORIGIN"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "no-referrer-when-downgrade"

# Functions (se precisar de funções Node/TS para processamento)
[functions]
directory = "netlify/functions"
node_bundler = "esbuild"

# Configuração de caching
[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/"
[headers.values]
Cache-Control = "no-cache"
